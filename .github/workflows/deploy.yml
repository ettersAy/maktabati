name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run docs:build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/.vitepress/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  test-production:
    name: E2E Test on Production
    runs-on: ubuntu-latest
    needs: deploy
    continue-on-error: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Wait for deployment (10 seconds)
        run: sleep 10

      - name: Run E2E tests on production
        id: e2e-tests
        run: |
          npx playwright test \
            --config tests/e2e/playwright.config.js
        env:
          E2E_BASE_URL: ${{ needs.deploy.outputs.page_url }}

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: playwright-report/

      - name: Revert deployment on test failure
        if: failure()
        run: |
          echo "❌ E2E tests failed on production!"
          echo "Rolling back to previous version..."
          
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          # Get the current commit and previous commit
          CURRENT_COMMIT=$(git rev-parse HEAD)
          PREVIOUS_COMMIT=$(git rev-parse HEAD~1)
          
          echo "Current commit: ${CURRENT_COMMIT:0:7}"
          echo "Rolling back to: ${PREVIOUS_COMMIT:0:7}"
          
          # Revert the commit
          git revert ${CURRENT_COMMIT} --no-edit
          
          # Force push to main (triggers new deploy)
          git push origin main --force-with-lease
          
          echo "✅ Rollback initiated - deployment will revert automatically"
          exit 1
